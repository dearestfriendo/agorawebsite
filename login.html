<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agora ThinkLab | Admin Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
        }
        
        /* Header logo styling */
        .login-header {
            background: #000000;
            padding: 20px 0;
            border-bottom: none;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        .header-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-logo-image {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
        }
        
        .header-logo-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #ffffff;
            margin: 0;
        }
        
        .tagline {
            font-size: 0.8rem;
            color: #d4af37;
            letter-spacing: 1px;
            font-weight: 500;
            margin-top: 4px;
        }
        
        /* Login form styling */
        .login-container {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            padding: 48px 24px;
        }
        
        .login-card {
            background: #ffffff;
            max-width: 420px;
            width: 100%;
            padding: 48px 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            border: 1px solid #eaeaea;
        }
        
        .login-card .logo-icon {
            font-size: 48px;
            color: #d4af37;
            margin-bottom: 24px;
        }
        
        .login-card h2 {
            font-size: 1.8rem;
            color: #000000;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .login-card p {
            color: #666;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }
        
        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #000000;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1);
        }
        
        .error-message {
            background: #fee;
            color: #d4af37;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #000000;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-login:hover {
            background: #d4af37;
            color: #000000;
            transform: translateY(-2px);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #d4af37;
        }
        
        /* Footer styling */
        footer {
            background: #000000;
            color: #888;
            padding: 40px 0;
            margin-top: 0;
        }
        
        .footer-content {
            text-align: center;
        }
        
        .footer-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .footer-logo-image {
            width: 40px;
            height: 40px;
        }
        
        .footer-logo-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .footer-logo h3 {
            font-size: 1.2rem;
            margin: 0;
            color: white;
            font-weight: 500;
        }
        
        .footer-tagline {
            font-size: 0.7rem;
            color: #666;
            margin-top: 2px;
        }
        
        .copyright {
            font-size: 0.75rem;
            color: #666;
            margin-top: 16px;
        }
        
        @media (max-width: 768px) {
            .logo {
                flex-direction: column;
                text-align: center;
            }
            .footer-logo {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="login-header">
        <div class="container header-container">
            <div class="logo">
                <div class="header-logo-image">
                    <img src="Agora_ThinkLab.png" alt="Agora ThinkLab Logo">
                </div>
                <div>
                    <h1>Agora ThinkLab</h1>
                    <p class="tagline">იფიქრე | იმოქმედე | შექმენი</p>
                </div>
            </div>
        </div>
    </header>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo-icon">
                <i class="fas fa-lock"></i>
            </div>
            <h2>Admin Access</h2>
            <p>Agora ThinkLab</p>
            
            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i> Invalid credentials
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Enter admin username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-login">Login to Dashboard</button>
            </form>
            <a href="index.html" class="back-link">← Back to website</a>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <div class="footer-logo-image">
                        <img src="Agora_ThinkLab.png" alt="Agora ThinkLab Logo">
                    </div>
                    <div>
                        <h3>Agora ThinkLab</h3>
                        <p class="footer-tagline">აგორა ფიქრის ლაბორატორია</p>
                    </div>
                </div>
                <p class="copyright">&copy; Agora ThinkLab. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        const ADMIN_USERNAME = "Agora ThinkLab";
        const ADMIN_PASSWORD = "agorathinklab2025!!";
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('adminUsername', username);
                window.location.href = 'admin.html';
            } else {
                document.getElementById('errorMessage').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorMessage').style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
